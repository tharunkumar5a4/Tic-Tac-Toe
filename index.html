<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic Tac Toe — Team Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Tic Tac Toe</h1>

    <section class="board-area">
      <div id="status" class="status">Turn: <span id="turn">X</span></div>

      <div id="board" class="board" aria-label="Tic Tac Toe board" role="grid">
        <!-- 9 cells created by JS or can be static. We'll create static for clarity -->
        <button class="cell" data-index="0" aria-label="cell 1"></button>
        <button class="cell" data-index="1" aria-label="cell 2"></button>
        <button class="cell" data-index="2" aria-label="cell 3"></button>
        <button class="cell" data-index="3" aria-label="cell 4"></button>
        <button class="cell" data-index="4" aria-label="cell 5"></button>
        <button class="cell" data-index="5" aria-label="cell 6"></button>
        <button class="cell" data-index="6" aria-label="cell 7"></button>
        <button class="cell" data-index="7" aria-label="cell 8"></button>
        <button class="cell" data-index="8" aria-label="cell 9"></button>
      </div>

      <div class="controls">
        <button id="restart" class="btn">Restart</button>
        <button id="aiToggle" class="btn">Play vs Computer: Off</button>
      </div>

      <div class="scoreboard">
        <div>Score</div>
        <div class="scores">
          <div>X: <span id="scoreX">0</span></div>
          <div>O: <span id="scoreO">0</span></div>
          <div>Draws: <span id="scoreD">0</span></div>
        </div>
      </div>
    </section>

    <footer class="notes">
      <small>Two-player by default. Toggle "Play vs Computer" to play against a simple CPU.</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
